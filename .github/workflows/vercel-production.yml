name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mobile unit tests
        run: npm run test --workspace @fitness/mobile

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Smoke check built web app
        run: npm run smoke:mobile:web

      - name: Deploy to production
        run: |
          DEPLOYMENT_OUTPUT="$(npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }})"
          DEPLOYMENT_URL="$(printf "%s\n" "$DEPLOYMENT_OUTPUT" | tail -n 1)"
          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
          printf "%s\n" "$DEPLOYMENT_OUTPUT"

      - name: Smoke check production URL
        env:
          PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
        run: |
          if [ -n "$PRODUCTION_URL" ]; then
            npm run smoke:url -- "$PRODUCTION_URL"
          else
            npm run smoke:url -- "$DEPLOYMENT_URL"
          fi
