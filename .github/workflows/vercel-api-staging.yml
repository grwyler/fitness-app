name: Deploy Staging (API) to Vercel

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: vercel-staging-api
  cancel-in-progress: true

jobs:
  deploy-api:
    name: API staging preview deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release notes
        run: npm run validate:release-notes

      - name: Validate changelog
        run: npm run validate:changelog

      - name: Build API
        run: npm run build:api

      - name: Test API
        env:
          NODE_ENV: test
          USE_PGLITE_DEV: "true"
        run: npm run test --workspace @fitness/api

      - name: Pull API Vercel environment (preview/develop)
        shell: bash
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel project configuration."
            echo "Expected GitHub secrets:"
            echo "- VERCEL_ORG_ID"
            echo "- VERCEL_API_PROJECT_ID (mapped to env var VERCEL_PROJECT_ID)"
            echo ""
            echo "Hint: this repo's linked API project is:"
            echo "  orgId: team_bp5GXtRky8HeY5HfFBhrjxL5"
            echo "  projectId: prj_92QxggggUr2anFDyzzR0gnzM2vcF"
            exit 1
          fi
      - name: Pull API Vercel environment (preview/develop) (Vercel CLI)
        run: npx vercel pull --yes --environment=preview --git-branch=develop --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run staging database migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set. Add STAGING_DATABASE_URL (recommended) or DATABASE_URL as a GitHub Actions secret."
            exit 1
          fi
          npm run db:migrate

      - name: Build API Vercel output (preview)
        run: npx vercel build --local-config vercel.api.json --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy API to preview (develop)
        run: |
          DEPLOYMENT_OUTPUT="$(npx vercel deploy --prebuilt --yes --local-config vercel.api.json --token=${{ secrets.VERCEL_TOKEN }})"
          DEPLOYMENT_URL="$(printf "%s\n" "$DEPLOYMENT_OUTPUT" | tail -n 1)"
          echo "API_DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
          printf "%s\n" "$DEPLOYMENT_OUTPUT"

      - name: Optional alias to stable staging domain
        env:
          STAGING_DOMAIN: ${{ vars.VERCEL_API_STAGING_DOMAIN }}
        run: |
          if [ -n "$STAGING_DOMAIN" ]; then
            npx vercel alias set "$API_DEPLOYMENT_URL" "$STAGING_DOMAIN" --token=${{ secrets.VERCEL_TOKEN }}
          fi
