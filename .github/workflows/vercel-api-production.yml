name: Deploy API to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-api-production
  cancel-in-progress: true

jobs:
  deploy-api:
    name: API production deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release notes
        run: npm run validate:release-notes

      - name: Validate changelog
        run: npm run validate:changelog

      - name: Build API
        run: npm run build:api

      - name: Test API
        env:
          NODE_ENV: test
          USE_PGLITE_DEV: "true"
        run: npm run test --workspace @fitness/api

      - name: Pull API Vercel environment
        shell: bash
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel project configuration."
            echo "Expected GitHub secrets:"
            echo "- VERCEL_ORG_ID"
            echo "- VERCEL_API_PROJECT_ID (mapped to env var VERCEL_PROJECT_ID)"
            echo ""
            echo "Hint: this repo's linked API project is:"
            echo "  orgId: team_bp5GXtRky8HeY5HfFBhrjxL5"
            echo "  projectId: prj_92QxggggUr2anFDyzzR0gnzM2vcF"
            exit 1
          fi
      - name: Pull API Vercel environment (Vercel CLI)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run production database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set. Add PRODUCTION_DATABASE_URL (recommended) or DATABASE_URL as a GitHub Actions secret."
            exit 1
          fi
          npm run db:migrate

      - name: Build API Vercel output
        run: npx vercel build --prod --local-config vercel.api.json --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy API to production
        run: |
          DEPLOYMENT_OUTPUT="$(npx vercel deploy --prebuilt --prod --yes --local-config vercel.api.json --token=${{ secrets.VERCEL_TOKEN }})"
          DEPLOYMENT_URL="$(printf "%s\n" "$DEPLOYMENT_OUTPUT" | tail -n 1)"
          echo "API_DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
          printf "%s\n" "$DEPLOYMENT_OUTPUT"

      - name: Smoke check API production URL
        shell: bash
        env:
          API_PRODUCTION_URL: ${{ vars.VERCEL_API_PRODUCTION_URL }}
        run: |
          CANONICAL_API_PRODUCTION_URL="https://setwisefitapi.vercel.app"

          echo "API deployment URL: ${API_DEPLOYMENT_URL}"
          echo "Configured VERCEL_API_PRODUCTION_URL: ${API_PRODUCTION_URL:-"(not set)"}"
          echo ""

          echo "Smoke checking deployment URL..."
          npm run smoke:api:url -- "$API_DEPLOYMENT_URL"
          echo ""

          PRODUCTION_TARGET="${API_PRODUCTION_URL:-$CANONICAL_API_PRODUCTION_URL}"
          echo "Smoke checking production alias URL: ${PRODUCTION_TARGET}"
          if ! npm run smoke:api:url -- "$PRODUCTION_TARGET"; then
            echo ""
            echo "Smoke check failed for the production URL."
            echo "If this is pointing at an old deployment, update the GitHub Actions variable VERCEL_API_PRODUCTION_URL to:"
            echo "  ${CANONICAL_API_PRODUCTION_URL}"
            exit 1
          fi
